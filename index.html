<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVA Tracker — Scan & Enregistre</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2127;
    --border: #2a2d35;
    --accent: #c8f04d;
    --accent2: #4df0c8;
    --accent3: #f04d7a;
    --text: #e8eaed;
    --muted: #6b7280;
    --tva20: #4d9ff0;
    --tva10: #4df0a0;
    --tva55: #c84df0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── Header ── */
  header {
    margin-bottom: 48px;
    position: relative;
  }
  .header-tag {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(32px, 8vw, 48px);
    font-weight: 300;
    line-height: 1.1;
    color: var(--text);
  }
  header h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .header-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 4px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── Config section ── */
  .config-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 16px;
    user-select: none;
    text-transform: uppercase;
  }
  .config-toggle:hover { color: var(--text); }
  .config-toggle svg { transition: transform 0.3s; }
  .config-toggle.open svg { transform: rotate(180deg); }

  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 32px;
    display: none;
    flex-direction: column;
    gap: 14px;
  }
  .config-panel.visible { display: flex; }

  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .field-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--muted); }

  .save-btn {
    align-self: flex-start;
    background: var(--accent);
    color: #0e0f11;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.05em;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-btn:active { transform: scale(0.97); }

  /* ── Upload zone ── */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 16px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s;
    position: relative;
    background: var(--surface);
    margin-bottom: 24px;
    display: block;
    -webkit-user-select: none;
    user-select: none;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200, 240, 77, 0.04);
  }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .upload-icon {
    width: 48px; height: 48px;
    margin: 0 auto 16px;
    opacity: 0.5;
  }
  .upload-zone h2 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 22px;
    margin-bottom: 8px;
    color: var(--text);
  }
  .upload-zone p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── Preview ── */
  #preview-container {
    display: none;
    margin-bottom: 24px;
    position: relative;
  }
  #preview-img {
    width: 100%;
    border-radius: 12px;
    border: 1px solid var(--border);
    max-height: 320px;
    object-fit: cover;
  }
  .preview-clear {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: background 0.2s;
  }
  .preview-clear:hover { background: rgba(240, 77, 122, 0.3); }

  /* ── Analyze button ── */
  .analyze-btn {
    width: 100%;
    background: var(--accent);
    color: #0e0f11;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 300;
    font-style: italic;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .analyze-btn.visible { display: flex; }
  .analyze-btn:hover { opacity: 0.88; }
  .analyze-btn:active { transform: scale(0.98); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Status ── */
  .status {
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }
  .status.visible { display: flex; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Result card ── */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .result-card.visible { display: block; }

  .result-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .result-header-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .result-badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .badge-20 { background: rgba(77,159,240,0.15); color: var(--tva20); }
  .badge-10 { background: rgba(77,240,160,0.15); color: var(--tva10); }
  .badge-55 { background: rgba(200,77,240,0.15); color: var(--tva55); }

  .result-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }

  .result-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .result-field { display: flex; flex-direction: column; gap: 4px; }
  .result-field.full { grid-column: 1 / -1; }
  .result-field label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .result-field input, .result-field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }
  .result-field input:focus, .result-field select:focus { border-color: var(--accent); }
  .result-field select option { background: var(--surface2); }

  /* Montants en accent */
  .result-field.money input {
    color: var(--accent);
    font-size: 15px;
  }

  .amounts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px;
  }
  .amount-item { display: flex; flex-direction: column; gap: 4px; }
  .amount-item label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .amount-item .val {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .amount-item.tva .val { color: var(--accent2); }
  .amount-item.ttc .val { color: var(--accent); font-size: 17px; }

  /* ── Submit button ── */
  .submit-btn {
    width: 100%;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 12px;
    padding: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.15s;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .submit-btn:hover {
    background: var(--accent);
    color: #0e0f11;
  }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 12px;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
    opacity: 0;
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--accent3); color: var(--accent3); }

  /* ── History ── */
  .history {
    margin-top: 40px;
    display: none;
  }
  .history.visible { display: block; }
  .history-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .history-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .history-item-left { display: flex; flex-direction: column; gap: 3px; }
  .history-commerce { font-size: 13px; color: var(--text); }
  .history-meta { font-size: 10px; color: var(--muted); }
  .history-amount { font-size: 14px; color: var(--accent); font-weight: 500; }

  /* ── Bouton pick dans upload zone ── */
  .upload-pick-btn {
    margin-top: 16px;
    background: var(--accent);
    color: #0e0f11;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
    display: inline-block;
  }
  .upload-pick-btn:hover { opacity: 0.85; }
  .upload-pick-btn:active { transform: scale(0.97); }
  .upload-drop-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 10px;
    letter-spacing: 0.08em;
  }

  /* ── Responsive ── */
  @media (max-width: 420px) {
    .result-row { grid-template-columns: 1fr; }
    .amounts-grid { grid-template-columns: 1fr 1fr; }
    .upload-drop-hint { display: none; } /* inutile sur mobile */
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="header-tag">Auto-entrepreneur · TVA réelle</div>
    <h1>TVA <em>Tracker</em><span class="header-dot"></span></h1>
  </header>

  <!-- Config -->
  <div class="config-toggle" id="configToggle" onclick="toggleConfig()">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    Configuration
  </div>

  <div class="config-panel" id="configPanel">
    <div class="field-group">
      <label class="field-label">Clé API Anthropic</label>
      <input class="field-input" type="password" id="anthropicKey" placeholder="sk-ant-..." />
    </div>
    <div class="field-group">
      <label class="field-label">ID Google Sheet</label>
      <input class="field-input" type="text" id="sheetId" placeholder="17IDYIirbQ-bwwNeOwtF2hcuDGhft1hsvB_H25_WR--c" />
    </div>
    <div class="field-group">
      <label class="field-label">Clé privée du compte de service (fichier JSON)</label>
      <textarea class="field-input" id="serviceAccountJson" rows="4" placeholder='Collez ici le contenu du fichier JSON téléchargé depuis Google Cloud'></textarea>
    </div>
    <button class="save-btn" onclick="saveConfig()">Enregistrer</button>
  </div>

  <!-- Upload zone -->
  <!-- Zone upload : label natif — fonctionne partout sans JS (Safari, Chrome, mobile, desktop) -->
  <label class="upload-zone" id="uploadZone" for="fileInput">
    <input type="file"
           accept="image/png,image/jpeg,image/jpg,image/webp,application/pdf"
           id="fileInput"
           style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none"
           onchange="handleFile(event)" />
    <svg class="upload-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="8" width="40" height="32" rx="4" stroke="currentColor" stroke-width="2"/>
      <circle cx="24" cy="24" r="7" stroke="currentColor" stroke-width="2"/>
      <circle cx="36" cy="14" r="2" fill="currentColor"/>
      <path d="M14 8V6a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="2"/>
    </svg>
    <h2>Importer un justificatif</h2>
    <p id="upload-hint">PNG · JPG · PDF · max 20 MB</p>
    <span class="upload-pick-btn">Choisir un fichier</span>
    <p class="upload-drop-hint">ou glissez-déposez ici</p>
  </label>

  <!-- Preview -->
  <div id="preview-container">
    <img id="preview-img" src="" alt="Ticket" style="display:none;" />
    <div id="preview-pdf" style="display:none; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center;">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="margin:0 auto 10px; display:block; opacity:0.6"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="2"/><path d="M14 2v6h6M9 13h6M9 17h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span id="preview-pdf-name" style="font-size:13px; color:var(--text);"></span>
      <div style="font-size:11px; color:var(--muted); margin-top:4px;">PDF prêt à analyser</div>
    </div>
    <button class="preview-clear" onclick="clearFile()">✕</button>
  </div>

  <!-- Analyze button -->
  <button class="analyze-btn" id="analyzeBtn" onclick="analyzeTicket()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Analyser le ticket
  </button>

  <!-- Status -->
  <div class="status" id="status">
    <div class="spinner"></div>
    <span id="statusText">Analyse en cours…</span>
  </div>

  <!-- Result card -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="result-header-title">Données extraites — à vérifier</span>
      <span class="result-badge" id="tvaBadge">TVA 20%</span>
    </div>
    <div class="result-body">
      <div class="result-row">
        <div class="result-field">
          <label>Date</label>
          <input type="date" id="f-date" />
        </div>
        <div class="result-field">
          <label>Taux TVA</label>
          <select id="f-taux" onchange="updateAmounts()">
            <option value="20%">20% — Taux normal</option>
            <option value="10%">10% — Restauration</option>
            <option value="5,5%">5,5% — Alimentation</option>
          </select>
        </div>
      </div>
      <div class="result-field full">
        <label>Commerce / Fournisseur</label>
        <input type="text" id="f-commerce" />
      </div>
      <div class="result-field full">
        <label>Catégorie</label>
        <select id="f-categorie">
          <option>Abonnement</option>
          <option>Matériel</option>
          <option>Fournitures</option>
          <option selected>Restauration</option>
          <option>Déplacement</option>
          <option>Formation</option>
          <option>Prestation</option>
          <option>Autre</option>
        </select>
      </div>
      <div class="result-field full money">
        <label>Montant HT (€)</label>
        <input type="number" id="f-ht" step="0.01" oninput="updateAmounts()" />
      </div>

      <div class="amounts-grid">
        <div class="amount-item">
          <label>Montant HT</label>
          <span class="val" id="disp-ht">—</span>
        </div>
        <div class="amount-item tva">
          <label>TVA</label>
          <span class="val" id="disp-tva">—</span>
        </div>
        <div class="amount-item ttc">
          <label>TTC</label>
          <span class="val" id="disp-ttc">—</span>
        </div>
      </div>

      <div class="result-row">
        <div class="result-field">
          <label>Mode de paiement</label>
          <select id="f-paiement">
            <option>CB</option>
            <option>Espèces</option>
            <option>Virement</option>
            <option>Prélèvement auto</option>
            <option>Chèque</option>
          </select>
        </div>
        <div class="result-field">
          <label>N° pièce</label>
          <input type="text" id="f-piece" placeholder="T-001" />
        </div>
      </div>

      <div class="result-field full">
        <label>Notes</label>
        <input type="text" id="f-notes" placeholder="Optionnel…" />
      </div>
    </div>
  </div>

  <!-- Submit -->
  <button class="submit-btn" id="submitBtn" style="display:none" onclick="addToSheet()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M12 5v14M5 12l7 7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Ajouter dans Google Sheets
  </button>

  <!-- History -->
  <div class="history" id="history">
    <div class="history-title">Session en cours</div>
    <div id="historyList"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
let config = {
  anthropicKey: '',
  sheetId: '17IDYIirbQ-bwwNeOwtF2hcuDGhft1hsvB_H25_WR--c',
  serviceAccount: null
};
let currentImageBase64 = null;
let sessionHistory = [];

// Charger config depuis localStorage
function loadConfig() {
  const saved = localStorage.getItem('tva_tracker_config');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      config = { ...config, ...parsed };
      if (config.anthropicKey) document.getElementById('anthropicKey').value = config.anthropicKey;
      if (config.sheetId) document.getElementById('sheetId').value = config.sheetId;
      if (config.serviceAccount) document.getElementById('serviceAccountJson').value = JSON.stringify(config.serviceAccount, null, 2);
    } catch(e) {}
  }
}

function saveConfig() {
  config.anthropicKey = document.getElementById('anthropicKey').value.trim();
  config.sheetId = document.getElementById('sheetId').value.trim();
  const jsonStr = document.getElementById('serviceAccountJson').value.trim();
  try {
    config.serviceAccount = JSON.parse(jsonStr);
  } catch(e) {
    showToast('❌ JSON invalide — vérifiez le contenu du fichier', 'error');
    return;
  }
  localStorage.setItem('tva_tracker_config', JSON.stringify(config));
  showToast('✓ Configuration sauvegardée', 'success');
  document.getElementById('configPanel').classList.remove('visible');
  document.getElementById('configToggle').classList.remove('open');
}

function toggleConfig() {
  const panel = document.getElementById('configPanel');
  const toggle = document.getElementById('configToggle');
  panel.classList.toggle('visible');
  toggle.classList.toggle('open');
}

// ═══════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════
let currentMediaType = 'image/jpeg';
const MAX_SIZE_MB = 20;

function processFile(file) {
  if (!file) return;

  const name = (file.name || '').toLowerCase();
  const type = (file.type || '').toLowerCase();
  const isPdf = type === 'application/pdf' || name.endsWith('.pdf');
  const isImage = type.startsWith('image/') || name.match(/\.(png|jpg|jpeg|webp|heic|heif)$/);

  // Vérif type — tolérant sur iOS (type parfois vide ou inhabituel)
  if (!isPdf && !isImage) {
    const msg = type
      ? '❌ Format non supporté : ' + type
      : '❌ Format non reconnu — PNG, JPG ou PDF uniquement';
    alert(msg); // alert() pour s'assurer que c'est visible même si showToast non dispo
    return;
  }

  // Vérif taille
  if (file.size > MAX_SIZE_MB * 1024 * 1024) {
    alert('❌ Fichier trop lourd — maximum ' + MAX_SIZE_MB + ' MB');
    return;
  }

  // Déterminer le media type pour l'API
  if (isPdf) {
    currentMediaType = 'application/pdf';
  } else if (type === 'image/png' || name.endsWith('.png')) {
    currentMediaType = 'image/png';
  } else if (type === 'image/webp' || name.endsWith('.webp')) {
    currentMediaType = 'image/webp';
  } else {
    currentMediaType = 'image/jpeg'; // défaut sûr pour jpg/jpeg/heic
  }

  const reader = new FileReader();

  reader.onerror = () => {
    alert('❌ Impossible de lire le fichier — réessayez');
  };

  reader.onload = (e) => {
    const dataUrl = e.target.result;
    if (!dataUrl || !dataUrl.includes(',')) {
      alert('❌ Fichier illisible — essayez un autre format');
      return;
    }
    currentImageBase64 = dataUrl.split(',')[1];

    const imgEl = document.getElementById('preview-img');
    const pdfEl = document.getElementById('preview-pdf');
    const pdfName = document.getElementById('preview-pdf-name');

    if (isPdf) {
      imgEl.style.display = 'none';
      pdfEl.style.display = 'block';
      pdfName.textContent = file.name;
    } else {
      imgEl.src = dataUrl;
      imgEl.style.display = 'block';
      pdfEl.style.display = 'none';
    }

    document.getElementById('preview-container').style.display = 'block';
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('analyzeBtn').classList.add('visible');
    document.getElementById('resultCard').classList.remove('visible');
    document.getElementById('submitBtn').style.display = 'none';
  };

  reader.readAsDataURL(file);
}

function handleFile(event) {
  const file = event.target.files && event.target.files[0];
  if (file) processFile(file);
}

function clearFile() {
  currentImageBase64 = null;
  currentMediaType = 'image/jpeg';
  document.getElementById('fileInput').value = '';
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('preview-pdf').style.display = 'none';
  document.getElementById('preview-container').style.display = 'none';
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('analyzeBtn').classList.remove('visible');
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('status').classList.remove('visible');
}

// ── Drag & Drop ─────────────────────────────
// NOTE : l'input file avec capture="environment" bloquait le drop sur desktop — retiré
const uploadZone = document.getElementById('uploadZone');

// Ouverture du picker gérée nativement par le label HTML — aucun JS requis

uploadZone.addEventListener('dragenter', (e) => {
  e.preventDefault();
  e.stopPropagation();
  uploadZone.classList.add('drag-over');
});

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = 'copy';
  uploadZone.classList.add('drag-over');
});

uploadZone.addEventListener('dragleave', (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (!uploadZone.contains(e.relatedTarget)) {
    uploadZone.classList.remove('drag-over');
  }
});

uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  e.stopPropagation();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  processFile(file);
});

// Détecter l'environnement et adapter le hint
window.addEventListener('DOMContentLoaded', () => {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const isFileProtocol = window.location.protocol === 'file:';
  const hint = document.getElementById('upload-hint');
  if (isMobile) {
    hint.textContent = 'PNG · JPG · PDF — depuis vos photos ou fichiers';
    document.querySelector('.upload-drop-hint').style.display = 'none';
  }
  if (isFileProtocol && !isMobile) {
    // Avertissement desktop en file://
    hint.textContent = 'PNG · JPG · PDF — ⚠️ Ouvrez via un serveur pour le drag & drop';
  }
});

// ═══════════════════════════════════════════
// ANALYSE TICKET VIA CLAUDE VISION
// ═══════════════════════════════════════════
async function analyzeTicket() {
  if (!currentImageBase64) return;
  if (!config.anthropicKey) {
    showToast('⚙️ Configurez votre clé API Anthropic d\'abord', 'error');
    toggleConfig();
    return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('status').classList.add('visible');
  document.getElementById('statusText').textContent = 'Analyse du ticket en cours…';

  const prompt = `Tu es un expert comptable français. Analyse cette image de ticket de caisse ou facture et extrais les informations suivantes en JSON uniquement, sans texte autour.

Retourne UNIQUEMENT ce JSON (pas de markdown, pas de backticks) :
{
  "commerce": "Nom du commerce ou fournisseur",
  "date": "YYYY-MM-DD",
  "montant_ht": 0.00,
  "taux_tva": "20%" ou "10%" ou "5,5%",
  "montant_tva": 0.00,
  "montant_ttc": 0.00,
  "categorie": "Restauration" ou "Matériel" ou "Fournitures" ou "Abonnement" ou "Déplacement" ou "Formation" ou "Prestation" ou "Autre",
  "mode_paiement": "CB" ou "Espèces" ou "Virement" ou "Chèque",
  "notes": "description courte optionnelle"
}

Si le ticket affiche uniquement le TTC, calcule le HT en divisant par (1 + taux).
Si la date n'est pas visible, utilise la date du jour (${new Date().toISOString().split('T')[0]}).
Si le taux TVA n'est pas indiqué, utilise 20% par défaut.`;

  // Timeout 30s
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 30000);

  const resetUI = () => {
    document.getElementById('status').classList.remove('visible');
    btn.disabled = false;
    clearTimeout(timeoutId);
  };

  try {
    let response;
    try {
      response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        signal: controller.signal,
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': config.anthropicKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              { type: currentMediaType === 'application/pdf' ? 'document' : 'image',
                source: { type: 'base64', media_type: currentMediaType, data: currentImageBase64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });
    } catch(fetchErr) {
      if (fetchErr.name === 'AbortError') {
        throw new Error('Délai dépassé (30s) — vérifiez votre connexion');
      }
      // TypeError = CORS bloqué (souvent fichier ouvert en file://)
      if (fetchErr instanceof TypeError) {
        throw new Error('CORS bloqué — ouvrez l'app via un serveur local ou Safari mobile (pas depuis file://)');
      }
      throw fetchErr;
    }

    if (!response.ok) {
      // Lire le corps même en cas d'erreur HTTP
      let errBody = {};
      try { errBody = await response.json(); } catch(_) {}
      const msg = errBody?.error?.message || `HTTP ${response.status}`;
      throw new Error(msg);
    }

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const rawText = data.content?.[0]?.text?.trim() || '';
    // Nettoyer les backticks markdown si Claude en met malgré le prompt
    const cleanText = rawText.replace(/^```json\n?|^```\n?|```$/gm, '').trim();

    let parsed;
    try {
      parsed = JSON.parse(cleanText);
    } catch(_) {
      throw new Error('Réponse Claude non parseable — réessayez');
    }

    populateForm(parsed);
    resetUI();
    document.getElementById('resultCard').classList.add('visible');
    document.getElementById('submitBtn').style.display = 'flex';
    showToast('✓ Ticket analysé avec succès', 'success');

  } catch(e) {
    resetUI();
    showToast('❌ ' + e.message, 'error');
    console.error('[TVA Tracker]', e);
  }
}

function populateForm(data) {
  document.getElementById('f-date').value = data.date || new Date().toISOString().split('T')[0];
  document.getElementById('f-commerce').value = data.commerce || '';
  document.getElementById('f-ht').value = data.montant_ht || '';
  document.getElementById('f-notes').value = data.notes || '';

  // Taux TVA
  const tauxMap = { '20%': '20%', '10%': '10%', '5,5%': '5,5%' };
  const taux = tauxMap[data.taux_tva] || '20%';
  document.getElementById('f-taux').value = taux;

  // Catégorie
  const cats = ['Abonnement','Matériel','Fournitures','Restauration','Déplacement','Formation','Prestation','Autre'];
  const cat = cats.find(c => c === data.categorie) || 'Autre';
  document.getElementById('f-categorie').value = cat;

  // Mode paiement
  document.getElementById('f-paiement').value = data.mode_paiement || 'CB';

  // N° pièce auto
  const count = sessionHistory.length + 1;
  document.getElementById('f-piece').value = `T-${String(count).padStart(3,'0')}`;

  updateAmounts();
  updateBadge(taux);
}

function updateAmounts() {
  const ht = parseFloat(document.getElementById('f-ht').value) || 0;
  const taux = document.getElementById('f-taux').value;
  const tauxVal = taux === '20%' ? 0.20 : taux === '10%' ? 0.10 : 0.055;
  const tva = ht * tauxVal;
  const ttc = ht + tva;

  document.getElementById('disp-ht').textContent = ht ? ht.toFixed(2) + ' €' : '—';
  document.getElementById('disp-tva').textContent = tva ? tva.toFixed(2) + ' €' : '—';
  document.getElementById('disp-ttc').textContent = ttc ? ttc.toFixed(2) + ' €' : '—';
  updateBadge(taux);
}

function updateBadge(taux) {
  const badge = document.getElementById('tvaBadge');
  badge.textContent = 'TVA ' + taux;
  badge.className = 'result-badge';
  if (taux === '20%') badge.classList.add('badge-20');
  else if (taux === '10%') badge.classList.add('badge-10');
  else badge.classList.add('badge-55');
}

// ═══════════════════════════════════════════
// GOOGLE SHEETS — JWT + API
// ═══════════════════════════════════════════

// Encode base64url
function base64url(str) {
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function base64urlFromUint8Array(arr) {
  let str = '';
  arr.forEach(b => str += String.fromCharCode(b));
  return base64url(str);
}

async function getAccessToken() {
  const sa = config.serviceAccount;
  if (!sa) throw new Error('Compte de service non configuré');

  const now = Math.floor(Date.now() / 1000);
  const header = base64url(JSON.stringify({ alg: 'RS256', typ: 'JWT' }));
  const claim  = base64url(JSON.stringify({
    iss: sa.client_email,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud: 'https://oauth2.googleapis.com/token',
    exp: now + 3600,
    iat: now
  }));

  const sigInput = `${header}.${claim}`;

  // Importer la clé privée PEM (robuste : gère \n littéraux et encodés)
  const pemContent = sa.private_key
    .replace(/-----BEGIN PRIVATE KEY-----/g, '')
    .replace(/-----END PRIVATE KEY-----/g, '')
    .replace(/\\n/g, '')
    .replace(/\n/g, '')
    .replace(/\r/g, '')
    .trim();
  const keyDer = Uint8Array.from(atob(pemContent), c => c.charCodeAt(0));
  const cryptoKey = await crypto.subtle.importKey(
    'pkcs8', keyDer,
    { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
    false, ['sign']
  );

  const encoder = new TextEncoder();
  const sigBuf = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', cryptoKey, encoder.encode(sigInput));
  const sig = base64urlFromUint8Array(new Uint8Array(sigBuf));

  const jwt = `${header}.${claim}.${sig}`;

  // Échanger le JWT contre un access token
  const tokenResp = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
  });
  const tokenData = await tokenResp.json();
  if (!tokenData.access_token) throw new Error('Token Google invalide : ' + JSON.stringify(tokenData));
  return tokenData.access_token;
}

// Déterminer l'onglet du mois (parsing local, pas de décalage UTC)
function getMonthSheetName(dateStr) {
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin',
                  'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const parts = dateStr.split('-').map(Number);
  return months[parts[1] - 1];
}

// Trouver la première ligne vide à partir de la row 11
async function findFirstEmptyRow(token, sheetName) {
  const range = encodeURIComponent(`${sheetName}!A11:A200`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${config.sheetId}/values/${range}`;
  const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  const data = await resp.json();
  const rows = data.values || [];
  return 11 + rows.length; // première ligne vide
}

async function addToSheet() {
  if (!config.serviceAccount) {
    showToast('⚙️ Configurez le compte de service d\'abord', 'error');
    toggleConfig();
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  document.getElementById('statusText').textContent = 'Connexion à Google Sheets…';
  document.getElementById('status').classList.add('visible');

  try {
    const date    = document.getElementById('f-date').value;
    const commerce= document.getElementById('f-commerce').value;
    const cat     = document.getElementById('f-categorie').value;
    const taux    = document.getElementById('f-taux').value;
    const ht      = parseFloat(document.getElementById('f-ht').value) || 0;
    const tauxVal = taux === '20%' ? 0.20 : taux === '10%' ? 0.10 : 0.055;
    const tva     = ht * tauxVal;
    const ttc     = ht + tva;
    const paiement= document.getElementById('f-paiement').value;
    const piece   = document.getElementById('f-piece').value;
    const notes   = document.getElementById('f-notes').value;

    const sheetName = getMonthSheetName(date);

    document.getElementById('statusText').textContent = `Ajout dans l'onglet ${sheetName}…`;

    const token = await getAccessToken();
    const targetRow = await findFirstEmptyRow(token, sheetName);

    // Colonnes : A=Date, B=Commerce, C=Catégorie, D=Taux TVA, E=HT, F=TVA20%, G=TVA10%, H=TVA5.5%, I=TVA Tot, J=TTC, K=Mode, L=N°, M=Notes
    const tva20 = taux === '20%' ? tva : 0;
    const tva10 = taux === '10%' ? tva : 0;
    const tva55 = taux === '5,5%' ? tva : 0;

    const rowData = [
      date, commerce, cat, taux,
      ht, tva20, tva10, tva55, tva,
      ttc, paiement, piece, notes
    ];

    const range = encodeURIComponent(`${sheetName}!A${targetRow}:M${targetRow}`);
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${config.sheetId}/values/${range}?valueInputOption=USER_ENTERED`;

    const resp = await fetch(url, {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ values: [rowData] })
    });

    const result = await resp.json();
    if (result.error) throw new Error(result.error.message);

    document.getElementById('status').classList.remove('visible');
    btn.disabled = false;

    // Historique session
    sessionHistory.unshift({ commerce, date, ttc: ttc.toFixed(2), taux });
    updateHistory();

    showToast(`✓ Ligne ajoutée dans ${sheetName} (row ${targetRow})`, 'success');

    // Reset
    setTimeout(() => clearFile(), 1500);

  } catch(e) {
    document.getElementById('status').classList.remove('visible');
    btn.disabled = false;
    showToast('❌ ' + e.message, 'error');
    console.error(e);
  }
}

function updateHistory() {
  const container = document.getElementById('history');
  const list = document.getElementById('historyList');
  container.classList.add('visible');
  list.innerHTML = sessionHistory.slice(0, 5).map(item => `
    <div class="history-item">
      <div class="history-item-left">
        <span class="history-commerce">${item.commerce}</span>
        <span class="history-meta">${formatDate(item.date)} · TVA ${item.taux}</span>
      </div>
      <span class="history-amount">${item.ttc} €</span>
    </div>
  `).join('');
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3500);
}
